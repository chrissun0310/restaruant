<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>YO MIEN 德语 A1 八周冲刺</title>
    <link rel="stylesheet" href="./deutsch-a1.css?v=20260507-training" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-panel" aria-label="今日学习进度">
        <div class="brand-row">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <rect x="7" y="8" width="34" height="32" rx="7" fill="#facc15" />
              <path d="M14 17h20M14 24h15M14 31h12" stroke="#111827" stroke-width="3" stroke-linecap="round" />
              <circle cx="36" cy="34" r="7" fill="#0f766e" />
              <path d="m33 34 2 2 4-5" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <div>
            <p class="eyebrow">Yomien 餐馆厨房与服务用语</p>
            <h1>德语 A1 八周冲刺</h1>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-copy">
            <span id="progressText">0/6 已完成</span>
            <strong id="progressLabel">今天开始</strong>
          </div>
          <div class="meter" aria-hidden="true"><span id="progressBar"></span></div>
        </div>
      </section>

      <section class="qr-entry" aria-label="Yomien QR 菜单入口">
        <div>
          <span>Yomien QR</span>
          <strong>餐牌与点餐入口</strong>
        </div>
        <a href="https://yomen.vercel.app/qr.html?v=20260505-dinner-fix">进入</a>
      </section>

      <section class="controls" aria-label="学习周选择">
        <button class="icon-button" id="prevWeek" aria-label="上一周">‹</button>
        <div class="week-display">
          <span>当前内容</span>
          <strong id="weekTitle">第 1 周</strong>
        </div>
        <button class="icon-button" id="nextWeek" aria-label="下一周">›</button>
      </section>

      <section class="day-strip" aria-label="学习日选择" id="dayStrip"></section>

      <section class="lesson-card" aria-label="每日学习内容">
        <div class="section-head compact">
          <div>
            <h2>每日学习内容</h2>
            <p id="dayTheme" class="muted-line"></p>
          </div>
          <span id="voiceStatus" class="voice-status">检测语音包</span>
        </div>
        <p id="fileModeWarning" class="file-warning" hidden>当前是文件模式，语音可能无声。请用 http://127.0.0.1:4188/ 打开。</p>
        <div id="dailyLesson" class="lesson-grid"></div>
      </section>

      <section class="focus-card" aria-label="本周重点">
        <h2>本周重点</h2>
        <div id="weekFocus" class="focus-list"></div>
      </section>

      <section class="phrase-card" aria-label="今天开口说">
        <h2>今天开口说</h2>
        <p id="phraseText"></p>
        <div class="media-row">
          <button id="newPhrase" class="primary-button">播放今天句子</button>
          <button id="stopAudio" class="secondary-button">停止播放</button>
        </div>
      </section>
    </main>

    <script src="./deutsch-a1.js?v=20260507-training"></script>
  </body>
</html>
